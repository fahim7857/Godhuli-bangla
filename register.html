<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Godhuli Bangla Boutique Resort</title>
    
    <!-- External Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css"> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #080f1f;
            --text-color: #d4c9b8;
            --form-bg: rgba(15, 23, 42, 0.8);
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(218, 165, 32, 0.2);
        }

        /* লাইট মোড কাস্টমাইজেশন */
        body.light-mode {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --form-bg: #ffffff;
            --input-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        .navbar-glass {
            background: var(--bg-color);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .form-container {
            background: var(--form-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-top: 100px;
        }

        /* ইনপুট ফিল্ড ফিক্স */
        input, select {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
        }

        /* ডার্ক মোডে সিলেক্ট অপশনের টেক্সট কালার ফিক্স */
        select option {
            background-color: #0f172a; /* ডার্ক ব্যাকগ্রাউন্ড */
            color: #ffffff;
        }
        
        body.light-mode select option {
            background-color: #ffffff;
            color: #1e293b;
        }

        input:focus, select:focus {
            border-color: #daa520 !important;
            box-shadow: 0 0 10px rgba(218, 165, 32, 0.2) !important;
            outline: none;
        }

        label { color: #daa520; font-weight: 500; }
    </style>
</head>
<body id="body">

    <!-- ═══════════════ NAVBAR ═══════════════ -->
    <nav class="navbar-glass fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-5 py-4 flex items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, #c45a00, #daa520);">
                    <i class="fa-solid fa-sun text-white text-sm"></i>
                </div>
                <div>
                    <div class="font-bold text-lg leading-none" style="color:#daa520;">Godhuli Bangla</div>
                    <div class="text-[10px] tracking-widest uppercase opacity-70" style="letter-spacing:0.18em;">Boutique Resort</div>
                </div>
            </a>

            <div class="hidden md:flex items-center gap-8 ml-10">
                <a href="index.html" class="text-sm font-semibold hover:text-yellow-600 transition-all duration-300">Home</a>
                <a href="index.html#rooms" class="text-sm font-semibold hover:text-yellow-600 transition-all duration-300">Rooms</a>
                <a href="index.html#about" class="text-sm font-semibold hover:text-yellow-600 transition-all duration-300">About</a>
            </div>

            <div class="ml-auto flex items-center gap-6">
                <div class="flex flex-col items-center gap-1 cursor-pointer group" onclick="toggleTheme()">
                    <button class="w-8 h-8 rounded-full flex items-center justify-center border border-yellow-500/30">
                        <i class="fa-solid fa-moon text-xs text-yellow-500" id="theme-icon"></i>
                    </button>
                    <span class="text-[9px] uppercase tracking-[0.2em] font-bold text-yellow-500">Theme</span>
                </div>

                <a href="login.html" class="px-5 py-2.5 rounded-full text-sm font-semibold border transition-all hover:bg-yellow-500/10 hover:scale-[1.02] active:scale-95"
                   style="border-color:rgba(218,165,32,0.45); color:#daa520;">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
                </a>
            </div>
        </div>
    </nav>

    <!-- ═══════════════ REGISTRATION FORM ═══════════════ -->
    <div class="max-w-2xl mx-auto mb-12 px-4">
        <div class="form-container p-8 rounded-3xl">
            <h2 class="text-3xl font-bold text-center mb-8" style="color: #daa520;">Create Account</h2>
            
            <form onsubmit="handleSignUp(event)" action="#" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block mb-2 text-sm">Select User Type</label>
                        <select id="userRole" onchange="switchUserType(this.value)" class="w-full p-3 rounded-xl outline-none">
                            <option value="personal">Personal User</option>
                            <option value="partner">Partner User (Hotel Owner)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-2 text-sm">Full Name</label>
                        <input type="text" id="full_name" placeholder="Enter full name" class="w-full p-3 rounded-xl outline-none" required>
                    </div>
                </div>

                <div id="age-group">
                    <label class="block mb-2 text-sm">Age</label>
                    <input type="number" id="age" min="18" placeholder="Must be 18+" class="w-full p-3 rounded-xl outline-none">
                </div>

             <div id="address-group" class="hidden space-y-4">
    <button type="button" onclick="initRegistrationMap()" class="w-full md:w-auto px-6 py-3 bg-yellow-500/10 border border-yellow-500/40 rounded-xl text-yellow-500">
        Select Location from Map
    </button>

    <div id="map-container" class="hidden mt-4">
        <div id="map" style="height: 350px; width: 100%; border-radius: 20px;"></div>
    </div>

    <div>
        <label class="text-[10px] uppercase opacity-60">Detailed Address</label>
        <textarea id="address" rows="3" class="w-full p-4 rounded-xl border border-yellow-500/20 bg-black/20 text-white" readonly></textarea>
    </div>
    <!-- address textarea এর নিচে এটা যোগ করুন -->
<div class="grid grid-cols-2 gap-3 mt-2">
    <input type="text" id="division" placeholder="Division (auto)" class="p-2 rounded-lg text-xs" readonly>
    <input type="text" id="district" placeholder="District (auto)" class="p-2 rounded-lg text-xs" readonly>
</div>
<input type="text" id="upazila" placeholder="Upazila (auto)" class="w-full p-2 rounded-lg text-xs mt-2" readonly>
    
    <input type="hidden" id="lat">
    <input type="hidden" id="lng">
</div>
                <div class="grid md:grid-cols-2 gap-6">
                    <div id="phone">
                        <label class="block mb-2 text-sm">Mobile (11 Digits)</label>
                        <input type="tel" id="mobile_number" pattern="[0-9]{11}" placeholder="017XXXXXXXX" class="w-full p-3 rounded-xl outline-none" required>
                    </div>
                    <!-- পাসওয়ার্ড ফিল্ড -->
<div>
    <label class="block mb-2 text-sm" for="password">Set Password</label>
    <input type="password" id="password" placeholder="Enter at least 6 characters" class="w-full p-3 rounded-xl outline-none" required>
</div>
<div>
    <label class="block mb-2 text-sm" for="confirm_password">Confirm Password</label>
    <input type="password" id="confirm_password" placeholder="Re-enter password" class="w-full p-3 rounded-xl outline-none" required>
</div>
                    <div>
                        <label class="block mb-2 text-sm">Gmail Address</label>
                        <input type="email" id="email" placeholder="example@gmail.com" class="w-full p-3 rounded-xl outline-none" required>
                    </div>
                </div>

                <div id="partner-only" class="hidden space-y-6 pt-6 border-t border-yellow-500/20">
                    <div id="resort_name">
                        <label class="block mb-2 text-sm font-bold">Resort/Hotel name</label>
                        <input type="text" id="hotel_name" placeholder="Hotel/Agency Name" class="w-full p-3 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm">NID Number (10 or 17 digits)</label>
                        <input type="text" id="nid_number" placeholder="Enter NID" class="w-full p-3 rounded-xl outline-none">
                        <p id="nid-error" class="hidden text-red-500 text-xs mt-1">Invalid NID! Must be 10 or 17 digits.</p>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-2 text-[10px] uppercase opacity-70">NID Copy</label>
                            <input type="file" id="nid_file" class="text-xs cursor-pointer w-full">
                        </div>
                        <div>
                            <label class="block mb-2 text-[10px] uppercase opacity-70">Trade License</label>
                            <input type="file" id="license_file" class="text-xs cursor-pointer w-full">
                        </div>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-4 rounded-xl font-bold text-white transition-all transform hover:scale-[1.01] active:scale-95 shadow-lg"
                        style="background: linear-gradient(135deg, #c45a00, #daa520);">
                    Complete Registration
                </button>
            </form>
        </div>
    </div>

    <footer class="py-10 text-center border-t border-yellow-500/10 opacity-60 text-sm">
        <p>&copy; 2026 Godhuli Bangla Boutique Resort. All rights reserved.</p>
    </footer>

    <script>

// ২. পেজ লোড হওয়ার সময় সেভ করা থিম চেক করা
window.onload = function() {
    const savedTheme = localStorage.getItem('theme');
    const body = document.getElementById('body');
    const icon = document.getElementById('theme-icon');

    if (savedTheme === 'light') {
        if (body) body.classList.add('light-mode');
        if (icon) icon.classList.replace('fa-moon', 'fa-sun');
    }
}

// ৩. ইউজার টাইপ অনুযায়ী ফর্ম ফিল্ড পরিবর্তন
function switchUserType(type) {
    const ageGrp = document.getElementById('age-group');
    const addrGrp = document.getElementById('address-group');
    const partnerSec = document.getElementById('partner-only');
    const ageInp = document.getElementById('age');

    if (type === 'partner') {
        if (ageGrp) ageGrp.classList.add('hidden');
        if (addrGrp) addrGrp.classList.remove('hidden');
        if (partnerSec) partnerSec.classList.remove('hidden');
        if (ageInp) ageInp.required = false;
        
        // পার্টনার সিলেক্ট করলে ম্যাপ ইনিশিয়ালাইজ ফাংশন কল হবে (যদি script.js এ থাকে)
        if (typeof initRegistrationMap === "function") {
            initRegistrationMap();
        }
    } else {
        if (ageGrp) ageGrp.classList.remove('hidden');
        if (addrGrp) addrGrp.classList.add('hidden');
        if (partnerSec) partnerSec.classList.add('hidden');
        if (ageInp) ageInp.required = true;
    }
}

// ৪. এনআইডি (NID) ভ্যালিডেশন
function validateNID() {
    const userTypeEl = document.getElementById('user_type');
    if (!userTypeEl) return true;

    const type = userTypeEl.value;
    if (type === 'partner') {
        const nidEl = document.getElementById('nid_number');
        const err = document.getElementById('nid-error');
        
        if (nidEl) {
            const nid = nidEl.value;
            if (nid.length === 10 || nid.length === 17) {
                if (err) err.classList.add('hidden');
                return true;
            } else {
                if (err) err.classList.remove('hidden');
                return false;
            }
        }
    }
    return true;
}
    </script>
    <script src="assets/js/script.js"></script>
</body>
</html>
