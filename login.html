<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Godhuli Bangla Boutique Resort</title>
    
    <!-- External Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css"> 

    <style>
        :root {
            --bg-color: #080f1f;
            --text-color: #d4c9b8;
            --form-bg: rgba(15, 23, 42, 0.8);
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(218, 165, 32, 0.2);
        }

        /* লাইট মোড ভেরিয়েবল */
        body.light-mode {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --form-bg: #ffffff;
            --input-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-glass {
            background: var(--bg-color);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .form-container {
            background: var(--form-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        input {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
        }

        input:focus {
            border-color: #daa520 !important;
            box-shadow: 0 0 10px rgba(218, 165, 32, 0.2) !important;
            outline: none;
        }

        label { color: #daa520; font-weight: 500; }
        
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px 20px;
        }
    </style>
</head>
<body id="body">

    <!-- ═══════════════ NAVBAR ═══════════════ -->
    <nav class="navbar-glass fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-5 py-4 flex items-center">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, #c45a00, #daa520);">
                    <i class="fa-solid fa-sun text-white text-sm"></i>
                </div>
                <div>
                    <div class="font-bold text-lg leading-none" style="color:#daa520;">Godhuli Bangla</div>
                    <div class="text-[10px] tracking-widest uppercase opacity-70" style="letter-spacing:0.18em;">Boutique Resort</div>
                </div>
            </a>

            <!-- Desktop Nav Links -->
            <div class="hidden md:flex items-center gap-8 ml-10">
                <a href="index.html" class="text-sm font-semibold hover:text-yellow-600 transition-all duration-300">Home</a>
                <a href="index.html#rooms" class="text-sm font-semibold hover:text-yellow-600 transition-all duration-300">Rooms</a>
                <a href="index.html#about" class="text-sm font-semibold hover:text-yellow-600 transition-all duration-300">About</a>
            </div>

            <!-- Right Side Section -->
            <div class="ml-auto flex items-center gap-6">
                <!-- Theme Toggle -->
                <div class="flex flex-col items-center gap-1 cursor-pointer group" onclick="toggleTheme()">
                    <button class="w-8 h-8 rounded-full flex items-center justify-center border border-yellow-500/30">
                        <i class="fa-solid fa-moon text-xs text-yellow-500" id="theme-icon"></i>
                    </button>
                    <span class="text-[9px] uppercase tracking-[0.2em] font-bold text-yellow-500">Theme</span>
                </div>

                <!-- Registration Button -->
                <a href="register.html" class="px-5 py-2.5 rounded-full text-sm font-semibold border transition-all hover:bg-yellow-500/10 hover:scale-[1.02] active:scale-95 whitespace-nowrap"
                   style="border-color:rgba(218,165,32,0.45); color:#daa520;">
                    <i class="fa-solid fa-user-plus mr-2"></i> Register
                </a>
            </div>
        </div>
    </nav>

    <!-- ═══════════════ LOGIN FORM ═══════════════ -->
    <div class="login-wrapper">
        <div class="form-container p-8 rounded-3xl w-full max-w-md">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold" style="color: #daa520;">Welcome Back</h2>
                <p class="text-sm opacity-70 mt-2">Login to manage your bookings</p>
            </div>
            
            <form action="#" class="space-y-6">
                <!-- Email -->
                <div>
                    <label class="block mb-2 text-sm">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 opacity-50"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" placeholder="example@gmail.com" class="w-full p-3 pl-12 rounded-xl outline-none" required>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block mb-2 text-sm">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 opacity-50"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" placeholder="••••••••" class="w-full p-3 pl-12 rounded-xl outline-none" required>
                    </div>
                </div>

                <!-- Remember & Forgot -->
                <div class="flex justify-between items-center text-xs">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-gray-300 text-yellow-600 focus:ring-yellow-500">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="text-yellow-500 hover:underline font-semibold">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="w-full py-4 rounded-xl font-bold text-white transition-all transform hover:scale-[1.01] active:scale-95 shadow-lg"
                        style="background: linear-gradient(135deg, #c45a00, #daa520);">
                    Sign In
                </button>

                <!-- Footer Text -->
                <p class="text-center text-sm opacity-70">
                    Don't have an account? 
                    <a href="register.html" class="text-yellow-500 font-bold hover:underline">Create One</a>
                </p>
            </form>
        </div>
    </div>

    <!-- ═══════════════ FOOTER ═══════════════ -->
    <footer class="py-10 text-center border-t border-yellow-500/10 opacity-60 text-sm">
        <p>&copy; 2026 Godhuli Bangla Boutique Resort. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script>
        // ১. থিম পরিবর্তন এবং সেভ করার ফাংশন
function toggleTheme() {
    const body = document.getElementById('body');
    const icon = document.getElementById('theme-icon');
    
    body.classList.toggle('light-mode');
    
    // বর্তমান থিমটি LocalStorage এ সেভ করে রাখা
    if (body.classList.contains('light-mode')) {
        localStorage.setItem('theme', 'light');
        icon.classList.replace('fa-moon', 'fa-sun');
    } else {
        localStorage.setItem('theme', 'dark');
        icon.classList.replace('fa-sun', 'fa-moon');
    }
}

// ২. পেজ লোড হওয়ার সময় সেভ করা থিম চেক করা
window.onload = function() {
    const savedTheme = localStorage.getItem('theme');
    const body = document.getElementById('body');
    const icon = document.getElementById('theme-icon');

    if (savedTheme === 'light') {
        body.classList.add('light-mode');
        if(icon) icon.classList.replace('fa-moon', 'fa-sun');
    }
}
    </script>
    <script src="assets/js/script.js"></script>
</body>
</html>
